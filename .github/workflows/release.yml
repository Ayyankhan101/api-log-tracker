name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.1.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Tag must match vX.Y.Z format, got: $TAG"
            exit 1
          fi

      - name: Validate Cargo.toml version matches tag
        run: |
          CARGO_VER=$(grep '^version =' Cargo.toml | head -1 | cut -d'"' -f2)
          TAG_VER="${{ steps.tag.outputs.tag }}"
          TAG_VER="${TAG_VER#v}"
          if [ "$CARGO_VER" != "$TAG_VER" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VER) does not match tag ($TAG_VER)"
            exit 1
          fi
          echo "OK: Cargo.toml version $CARGO_VER matches tag"

      - name: Validate package.json version matches tag
        run: |
          NPM_VER=$(node -p "require('./my-terminal-ui/package.json').version")
          TAG_VER="${{ steps.tag.outputs.tag }}"
          TAG_VER="${TAG_VER#v}"
          if [ "$NPM_VER" != "$TAG_VER" ]; then
            echo "ERROR: package.json version ($NPM_VER) does not match tag ($TAG_VER)"
            exit 1
          fi
          echo "OK: package.json version $NPM_VER matches tag"

      - name: Set version output
        id: check
        run: echo "version=${{ steps.tag.outputs.tag }}" >> "$GITHUB_OUTPUT"

  publish:
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release
        run: cargo build --release

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: my-terminal-ui/package-lock.json

      - name: Install TUI deps
        run: npm install
        working-directory: my-terminal-ui

      - name: Build TUI
        run: npm run build
        working-directory: my-terminal-ui

      - name: Publish to npm
        run: npm publish
        working-directory: my-terminal-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Copy README for npm
        run: cp README.md my-terminal-ui/README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/api_log_tracker
