name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml version
        run: |
          sed -i '0,/^version = .*$/s/^version = .*$/version = "${{ steps.version.outputs.VERSION }}"/' Cargo.toml

      - name: Update package.json version
        run: |
          cd my-terminal-ui
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.VERSION }}"/' package.json

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build Rust
        run: cargo build --release

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Copy README for npm
        run: cp README.md my-terminal-ui/README.md

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: my-terminal-ui/package-lock.json

      - name: Install TUI deps
        run: npm ci
        working-directory: my-terminal-ui

      - name: Build TUI
        run: npm run build
        working-directory: my-terminal-ui

      - name: Publish to npm
        run: npm publish
        working-directory: my-terminal-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/api_log_tracker
