name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build Rust
        run: cargo build --verbose

      - name: Clippy check
        run: cargo clippy -- -D warnings

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-terminal-ui/package-lock.json

      - name: Install TUI deps
        run: npm ci
        working-directory: my-terminal-ui

      - name: Build TUI
        run: npm run build
        working-directory: my-terminal-ui
